name: Promote Branch

on:
  repository_dispatch:
    types: [promote-branch]

permissions:
  contents: write
  issues: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PROMOTE_PAT }}

      - name: Merge branch
        id: merge
        run: |
          SOURCE="${{ github.event.client_payload.source }}"
          TARGET="${{ github.event.client_payload.target }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin "${SOURCE}"
          git checkout "${TARGET}"

          if git merge "origin/${SOURCE}" --no-edit; then
            git push origin "${TARGET}"
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "message=Successfully merged \`${SOURCE}\` into \`${TARGET}\`" >> "$GITHUB_OUTPUT"
          else
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            echo "message=Merge conflict when merging \`${SOURCE}\` into \`${TARGET}\`" >> "$GITHUB_OUTPUT"
            git merge --abort
            exit 1
          fi

      - name: Report result
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROMOTE_PAT }}
          script: |
            const status = '${{ steps.merge.outputs.status }}';
            const emoji = status === 'success' ? ':white_check_mark:' : ':x:';
            const issue_number = ${{ github.event.client_payload.issue_number }};

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: `## Promote ${emoji}\n\n${{ steps.merge.outputs.message }}\n\n**Actor:** @${{ github.event.client_payload.actor }}`
            });
