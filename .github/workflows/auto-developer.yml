name: Auto Developer

on:
  issues:
    types: [labeled]

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  develop:
    if: github.event.label.name == 'action:develop'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Create branch
        id: branch
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}
          BRANCH="feat/issue-${ISSUE_NUM}"
          git checkout -b "$BRANCH"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/big-pickle
          use_github_token: "true"
          prompt: |
            Implement this feature: ${{ github.event.issue.title }}

            Steps:
            1. Read the issue body for requirements
            2. Explore relevant Atlas files
            3. Make minimal, focused changes
            4. Update knowledge/manifest if needed

            Keep changes small and targeted. Follow existing patterns.
