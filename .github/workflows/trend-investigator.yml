name: Trend Investigator

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 9am
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  investigate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run OpenCode
        uses: anomalyco/opencode/github@v1.18.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/big-pickle
          use_github_token: "true"
          prompt: |
            Research AI agent trends and Atlas gaps. Create 2-3 feature request issues.

            Before creating any issue, check for near-duplicates first:
            gh issue list --label "type:feature" --state open --limit 100

            Skip any topic that substantially overlaps an existing open
            "type:feature" issue rather than filing a near-duplicate.

            For each genuinely new issue use gh CLI:
            gh issue create --title "[FEATURE]: <title>" --label "type:feature,priority:P1" --body "## Description\n<what>\n\n## Motivation\n<why>\n\n## Acceptance Criteria\n- [ ] <criteria>"

            Focus on: agent orchestration, context engineering, security, knowledge management.
            Keep issues concise (under 200 words each).
