name: Feature Reviewer

on:
  issues:
    types: [opened]

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  review:
    if: contains(github.event.issue.labels.*.name, 'type:feature')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/big-pickle
          use_github_token: "true"
          prompt: |
            Review this feature request and post a concise evaluation comment.

            Issue: ${{ github.event.issue.title }}

            Post a comment with:
            ## Evaluation
            | Feasibility | Priority | Effort | Risk |
            |-------------|----------|--------|------|
            | <H/M/L> | <P0-P3> | <S/M/L> | <L/M/H> |

            ### Approach
            <2-3 sentences>

            ### Key Risks
            <1-2 bullets>

            Keep response under 150 words.
