name: Auto Reviewer

on:
  pull_request:
    types: [opened]

permissions:
  id-token: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/big-pickle
          use_github_token: "true"
          prompt: |
            Review this PR concisely. Check:
            1. Code quality
            2. Atlas conventions
            3. Knowledge cross-refs
            4. Token budgets

            Post comment with:
            ## Review
            **Verdict**: APPROVE / REQUEST_CHANGES / COMMENT
            **Notes**: <2-3 bullets>

            Keep under 100 words.
