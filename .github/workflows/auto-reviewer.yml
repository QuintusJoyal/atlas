name: Auto Reviewer

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run OpenCode
        uses: anomalyco/opencode/github@v1.18.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          model: opencode/big-pickle
          use_github_token: "true"
          prompt: |
            Review this PR concisely. Check:
            1. Code quality
            2. Atlas conventions
            3. Knowledge cross-refs
            4. Token budgets

            Decide a verdict: approve, request-changes, or comment.

            Submit it as a real PR review, not a plain comment, using the gh CLI
            (PR_NUMBER is set in the environment):

              gh pr review "$PR_NUMBER" --approve --body "<2-3 bullet summary>"
              gh pr review "$PR_NUMBER" --request-changes --body "<2-3 bullet summary, name what must change>"
              gh pr review "$PR_NUMBER" --comment --body "<2-3 bullet summary>"

            Pick exactly one command matching your verdict and run it. A plain
            issue/PR comment is not a substitute — it must be an actual review,
            since only a real review can be wired into branch protection.

            Keep the body under 100 words.
